name: Nightly Universal APK

on:
  push:
    branches:
      - master
    paths-ignore:
      - '*.md'

concurrency:
  group: nightly-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - run: chmod +x gradlew

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      # 🔥 SOLO UNIVERSAL
      - name: Build Universal APK
        run: ./gradlew assembleUniversalDebug

      # 🔍 Ver qué se generó
      - name: List outputs
        run: ls -R app/build/outputs/apk/

      # ✅ Encontrar APK correcto
      - name: Get APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/universal/debug -name "*.apk" | head -n 1)
          echo "APK encontrado en: $APK_PATH"
          cp "$APK_PATH" app-universal.apk

      # 🚀 Release nightly
      - name: Upload Nightly
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build (Universal)
          prerelease: true
          files: app-universal.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
