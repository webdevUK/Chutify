name: Clear History

on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Remove Unwanted Files
        run: |
          # Remove common files
          rm -rf README.md
          rm -rf README*
          rm -rf LICENSE
          rm -rf LICENSE*
          rm -rf CHANGELOG*
          rm -rf CONTRIBUTING*
          rm -rf CODE_OF_CONDUCT*
          rm -rf SECURITY*
          rm -rf .gitattributes

          # Remove folders
          rm -rf docs
          rm -rf screenshots
          rm -rf examples
          rm -rf demo

          # Remove large junk files
          find . -name "*.apk" -delete
          find . -name "*.zip" -delete
          find . -name "*.mp4" -delete
          find . -name "*.bak" -delete
          find . -name "*.tmp" -delete

          # Keep only workflow files inside .github
          find .github -mindepth 1 \
            ! -path ".github/workflows" \
            ! -path ".github/workflows/*" \
            -exec rm -rf {} +

      - name: Create Fresh Commit
        run: |
          git checkout --orphan latest_branch

          git add -A
          git commit -m "Initial commit"

          git branch -D main || true
          git branch -D master || true

          git branch -m main

      - name: Force Push Clean Repo
        run: |
          git push -f origin main
